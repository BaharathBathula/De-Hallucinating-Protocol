<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance Runtime Dashboard</title>

    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <div class="container">

        <h1>De-Hallucinating Protocol</h1>
        <h2>Governance Runtime Dashboard</h2>

        <div class="metrics-grid">

            <div class="metric-card">
                <h3>Total Events</h3>
                <p id="total-events">0</p>
            </div>

            <div class="metric-card">
                <h3>Escalated Events</h3>
                <p id="escalated-events">0</p>
            </div>

            <div class="metric-card">
                <h3>Blocked Events</h3>
                <p id="blocked-events">0</p>
            </div>

            <div class="metric-card">
                <h3>Restricted Events</h3>
                <p id="restricted-events">0</p>
            </div>

        </div>

        <div class="events-section">
            <h2>Governance Event Timeline</h2>

            <table>
                <thead>
                    <tr>
                        <th>Event Type</th>
                        <th>Runtime State</th>
                        <th>Trust Score</th>
                        <th>Escalation</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>

                <tbody id="events-table-body">

                </tbody>
            </table>
        </div>

    </div>

    <script src="/static/dashboard.js"></script>

</body>

</html>
